name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet (Windows target)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go vet ./...

      - name: Test (testable packages with race + coverage)
        run: |
          go test -race -coverprofile=coverage.out \
            ./internal/config/... \
            ./internal/launcher/... \
            ./internal/uistate/...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  build:
    name: Cross-compile Windows binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build VRCLaunch.exe
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go build -trimpath -ldflags="-H windowsgui -s -w" -o VRCLaunch.exe .
          ls -lh VRCLaunch.exe

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: VRCLaunch-windows-amd64
          path: VRCLaunch.exe
          retention-days: 14
